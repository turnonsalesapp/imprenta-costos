version: 2
updates:
  # Dependencias de npm: PRs semanales con actualizaciones (incl. de seguridad).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      prefix-development: "chore"

  # Acciones de GitHub usadas por el workflow de CI.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
